services:

  postgres:
    image: postgres:16-alpine
    container_name: shophub-postgres
    environment:
      POSTGRES_USER:     ecommerce
      POSTGRES_PASSWORD: ecommerce_secret
      POSTGRES_DB:       postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 8s

  redis:
    image: redis:7-alpine
    container_name: shophub-redis
    command: redis-server --requirepass ecommerce_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ecommerce_secret", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
